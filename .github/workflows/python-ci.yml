---
name: Build & Security

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout"
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🐍 Setup Python 3.12"
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'

      - name: "🏗️ Build sdist + wheel"
        run: |
          python -m pip install --upgrade pip build
          python -m build

  security:
    name: Secret scan + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: "📥 Checkout"
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: "🔑 Secret scan (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python 3.12"
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'

      - name: "🐍 Python vulnerability scan (pip-audit)"
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --quiet --upgrade pip
          /tmp/audit-venv/bin/pip install --quiet pip-audit
          /tmp/audit-venv/bin/pip install --quiet -e ".[dev]"
          /tmp/audit-venv/bin/pip-audit --skip-editable
