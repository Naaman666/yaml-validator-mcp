---
name: Python CI

"on":
  push:
    branches: [main, develop]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'setup.cfg'
      - 'setup.py'
      - '.flake8'
      - '.pylintrc'
      - 'mypy.ini'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - 'setup.cfg'
      - 'setup.py'
      - '.flake8'
      - '.pylintrc'
      - 'mypy.ini'
      - '.github/workflows/python-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PIP_NO_COLOR: 1

jobs:
  lint-and-test:
    name: Lint, Test & Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout"
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🐍 Setup Python 3.12"
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'

      - name: "💾 Cache pip"
        # actions/cache v4.2.2
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-py3.12-

      - name: "🔧 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "🧹 Lint (ruff / flake8 / pylint) + mypy"
        run: |
          HAS_RUFF=$(python -c "import ruff" 2>/dev/null && echo 1 || echo 0)
          HAS_FLAKE8=$(python -c "import flake8" 2>/dev/null && echo 1 || echo 0)
          HAS_PYLINT=$(python -c "import pylint" 2>/dev/null && echo 1 || echo 0)
          HAS_MYPY=$(python -c "import mypy" 2>/dev/null && echo 1 || echo 0)

          if [ "$HAS_RUFF" -eq 0 ] \
             && [ "$HAS_FLAKE8" -eq 0 ] \
             && [ "$HAS_PYLINT" -eq 0 ]; then
            echo "⚠️ No linter detected (ruff / flake8 / pylint). Skipping."
          fi

          if [ "$HAS_RUFF" -eq 1 ]; then
            echo "▶ ruff"
            ruff check . --output-format=github
            ruff format --check .
          fi

          if [ "$HAS_FLAKE8" -eq 1 ]; then
            echo "▶ flake8"
            flake8 .
          fi

          if [ "$HAS_PYLINT" -eq 1 ]; then
            PY_FILES=$(git ls-files '*.py')
            if [ -n "$PY_FILES" ]; then
              echo "▶ pylint"
              pylint $PY_FILES
            fi
          fi

          if [ "$HAS_MYPY" -eq 1 ]; then
            echo "▶ mypy"
            mypy --strict server.py
          else
            echo "⚠️ mypy not detected. Skipping type check."
          fi

      - name: "🧪 pytest + coverage"
        run: |
          pytest \
            --tb=short \
            --cov=server \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -q

      - name: "📊 Upload coverage"
        if: always()
        # actions/upload-artifact v4.6.1
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: coverage-${{ github.run_number }}
          path: coverage.xml
          retention-days: 7

      - name: "🏗️ Build check (sdist + wheel)"
        run: |
          pip install build
          python -m build

      - name: "📤 Upload dist"
        # actions/upload-artifact v4.6.1
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 3

  # ════════════════════════════════════════════════════════
  # SECURITY JOB — Vulnerability scan, secret check, coverage
  # ════════════════════════════════════════════════════════
  security-checks:
    name: Security & Coverage Checks
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: "📥 Checkout"
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: "🔑 Secret scan (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Python vulnerability scan (pip-audit)"
        if: hashFiles('requirements*.txt', 'pyproject.toml') != ''
        run: |
          pip install pip-audit
          if [ -f "requirements.txt" ]; then
            pip-audit -r requirements.txt
          elif [ -f "pyproject.toml" ]; then
            pip-audit
          fi
