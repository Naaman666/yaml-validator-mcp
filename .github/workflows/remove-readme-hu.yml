name: Remove README_HU.md from main

on:
  push:
    branches:
      - main

jobs:
  remove-readme-hu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Delete README_HU.md if exists
        run: |
          if [ -f README_HU.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm README_HU.md
            git commit -m "chore: remove README_HU.md from main"
            git push
          fi
