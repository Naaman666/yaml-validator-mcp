name: Remove README_HU.md from main

on:
  push:
    branches:
      - main

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure merge driver
        run: git config merge.ours.driver true

      - name: Remove README_HU.md if present
        run: |
          if [ -f README_HU.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm README_HU.md
            git commit -m "chore: remove README_HU.md from main"
            git push
          else
            echo "README_HU.md not present, nothing to do."
          fi
