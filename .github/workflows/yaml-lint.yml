---
name: YAML Lint

"on":
  push:
    branches: [main]
    paths:
      - '.github/**/*.yml'
      - '.github/**/*.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.github/**/*.yml'
      - '.github/**/*.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML & GHA lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install yamllint actionlint-py

      - name: yamllint
        run: yamllint .github/

      - name: actionlint
        run: actionlint .github/workflows/*.yml
