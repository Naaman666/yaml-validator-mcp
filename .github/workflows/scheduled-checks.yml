---
name: Scheduled Checks

"on":
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-and-outdated:
    name: License Compliance & Outdated Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write

    steps:
      - name: 📥 Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: 🐍 Setup Python
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'
          cache: pip

      - name: 📋 License compliance (pip-licenses)
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GPL;AGPL;LGPL" --format=markdown \
            > license-report-python.md || {
            echo "❌ Incompatible license detected."
            cat license-report-python.md
            exit 1
          }

      - name: 📦 Outdated dependencies
        run: |
          pip install pip-review
          pip-review --local > outdated-python.txt || true
          if [ -s outdated-python.txt ]; then
            echo "⚠️ Outdated Python packages:"
            cat outdated-python.txt
          else
            echo "✅ All Python packages up to date."
          fi

      - name: 📤 Upload reports
        if: always()
        # actions/upload-artifact v4.6.1
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1
        with:
          name: scheduled-reports-${{ github.run_number }}
          path: |
            license-report-python.md
            outdated-python.txt
          retention-days: 30
          if-no-files-found: ignore
